<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Fetch Test</title>
    <style>
        body { font-family: monospace; padding: 2rem; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { background: white; padding: 1.5rem; margin-bottom: 1rem; border-radius: 8px; border-left: 4px solid #20b2aa; }
        h2 { color: #333; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        pre { background: #f0f0f0; padding: 1rem; overflow-x: auto; }
        button { padding: 0.5rem 1rem; background: #20b2aa; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #17a2b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Event Fetch Test</h1>
        
        <div class="section">
            <h2>Test Events API</h2>
            <button onclick="testFetch()">Fetch Events</button>
            <div id="result"></div>
        </div>

        <div class="section">
            <h2>Browser Console</h2>
            <p>Open your browser's Developer Tools (F12) and check the Console tab for debug messages.</p>
        </div>
    </div>

    <script>
        async function testFetch() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                console.log('🔍 Testing fetch to events-api.php...');
                
                const response = await fetch('events-api.php');
                console.log('Response status:', response.status);
                console.log('Response headers:', {
                    'content-type': response.headers.get('content-type'),
                    'ok': response.ok
                });
                
                const text = await response.text();
                console.log('Raw response (first 500 chars):', text.substring(0, 500));
                
                try {
                    const events = JSON.parse(text);
                    console.log('✓ Successfully parsed JSON');
                    console.log('Number of events:', events.length);
                    
                    if (events.length > 0) {
                        console.log('First event:', events[0]);
                        resultDiv.innerHTML = `
                            <p class="success">✓ Success! Found ${events.length} event(s)</p>
                            <pre>${JSON.stringify(events[0], null, 2)}</pre>
                        `;
                    } else {
                        resultDiv.innerHTML = '<p class="error">No events in database</p>';
                    }
                } catch (jsonError) {
                    console.error('❌ JSON parse error:', jsonError);
                    resultDiv.innerHTML = `
                        <p class="error">❌ Invalid JSON response</p>
                        <pre>${text}</pre>
                    `;
                }
            } catch (error) {
                console.error('❌ Fetch error:', error);
                resultDiv.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }

        // Auto-test on page load
        window.addEventListener('load', () => {
            console.log('Page loaded, ready to test');
        });
    </script>
</body>
</html>
